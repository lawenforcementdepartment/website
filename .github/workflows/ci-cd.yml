name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  # =========================
  # 1. RUN TESTS
  # =========================
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Run Tests
        run: mvn clean test

  # =========================
  # 2. BUILD DOCKER IMAGE
  # =========================
  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t led-website .

      - name: Save Image
        run: docker save led-website | gzip > led-website.tar.gz

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: led-website
          path: led-website.tar.gz

  # =========================
  # 3. DEPLOY TO VPS
  # =========================
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download Image
        uses: actions/download-artifact@v4
        with:
          name: led-website

      - name: Copy Image to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "led-website.tar.gz"
          target: "~/"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: SMTP_HOST, SMTP_PORT, SMTP_USERNAME, SMTP_PASSWORD
          script: |
            # Clone or update repo
            if [ -d website ]; then
              cd website
              git pull --rebase -Xours
            else
              git clone git@github.com:lawenforcementdepartment/website.git
              cd website
            fi

            # Load Docker image
            docker load < ~/led-website.tar.gz

            # Stop existing container
            docker stop led-website || true
            docker rm led-website || true
            
            # Update env secrets
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_USERNAME=${{ secrets.SMTP_USERNAME }}
            SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}

            # Run new container
            docker-compose up -d
            
            # Unset secrets
            unset SMTP_HOST
            unset SMTP_PORT
            unset SMTP_USERNAME
            unset SMTP_PASSWORD