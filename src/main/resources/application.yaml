spring:
  application:
    name: led
  datasource:
    url: jdbc:h2:file:./data/db
    username: ${DB_USER:polis}
    password: ${DB_PASSWORD:polis}
    driverClassName: org.h2.Driver
  sql:
    init:
      mode: always
  jpa:
    defer-datasource-initialization: true
    database-platform: org.hibernate.dialect.H2Dialect
    generate-ddl: true
    hibernate:
      ddl-auto: update