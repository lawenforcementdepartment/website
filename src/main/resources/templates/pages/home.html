<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Home')}"></head>

<body>

<div th:replace="~{fragments/layout :: header}"></div>

<main>
    <section>
        <h2>Welcome to the Law Enforcement Department</h2>
        <p th:text="${welcomeMessage}">Welcome officer.</p>
    </section>

    <section>
        <h3>Latest News</h3>
        <div th:each="news : ${latestNews}" class="card">
            <h4 th:text="${news.title}"></h4>
            <p th:text="${news.summary}"></p>
        </div>
    </section>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
